name: "Setup parakeet.cpp"
description: >
  Fetches the pinned parakeet.cpp CPU/portable sidecar and places the Tauri
  externalBin binary into src-tauri/binaries with the target-triple suffix.

outputs:
  version:
    description: "Pinned parakeet.cpp release tag"
    value: v0.3.2

runs:
  using: composite
  steps:
    - name: Restore cached parakeet.cpp sidecar
      id: cache
      uses: actions/cache@v4
      with:
        path: |
          src-tauri/binaries/parakeet-cli-*
          src-tauri/binaries/parakeet-stream-worker-*
        key: parakeet-${{ runner.os }}-v0.3.2-stream-worker-v1

    - name: Download parakeet.cpp sidecar (Windows)
      if: runner.os == 'Windows' && steps.cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $tag = "v0.3.2"
        $asset = "parakeet-v0.3.2-bin-win-cpu-x64.zip"
        $expected = "71bceab8cd2a27ada6abb1234e6b0b81dc043964345219492f0d1d8522517a2b"
        $url = "https://github.com/mudler/parakeet.cpp/releases/download/$tag/$asset"
        $dest = "src-tauri\binaries"
        $zip = Join-Path $env:TEMP $asset
        $ext = Join-Path $env:TEMP "parakeet-ext"

        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
        $actual = (Get-FileHash -Algorithm SHA256 -Path $zip).Hash.ToLowerInvariant()
        if ($actual -ne $expected) {
          Write-Error "Checksum mismatch for $asset. Expected $expected, got $actual"
          exit 1
        }

        Expand-Archive -Path $zip -DestinationPath $ext -Force
        $cli = Get-ChildItem $ext -Recurse -Filter "parakeet-cli.exe" | Select-Object -First 1
        if (-not $cli) { Write-Error "parakeet-cli.exe not found in archive"; exit 1 }
        Move-Item $cli.FullName "$dest\parakeet-cli-x86_64-pc-windows-msvc.exe" -Force
        Remove-Item $zip -Force
        Remove-Item $ext -Recurse -Force

    - name: Build Parakeet streaming worker (Windows)
      if: runner.os == 'Windows' && steps.cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $tag = "v0.3.2"
        $src = Join-Path $env:TEMP "parakeet-src"
        $build = Join-Path $env:TEMP "parakeet-build"
        $workerSrc = "src-tauri\sidecars\parakeet-stream-worker"
        $workerDst = Join-Path $src "examples\localvoice-stream-worker"

        Remove-Item $src -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item $build -Recurse -Force -ErrorAction SilentlyContinue
        git clone --depth 1 --recurse-submodules --shallow-submodules --branch $tag https://github.com/mudler/parakeet.cpp.git $src
        Copy-Item $workerSrc $workerDst -Recurse
        Add-Content -Path (Join-Path $src "CMakeLists.txt") -Value "add_subdirectory(examples/localvoice-stream-worker)"

        cmake -S $src -B $build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_BMI2=OFF -DPARAKEET_BUILD_CLI=OFF -DPARAKEET_BUILD_SERVER=OFF
        cmake --build $build --config Release --target parakeet-stream-worker --parallel
        $worker = Get-ChildItem $build -Recurse -Filter "parakeet-stream-worker.exe" | Select-Object -First 1
        if (-not $worker) { Write-Error "parakeet-stream-worker.exe not found"; exit 1 }
        Move-Item $worker.FullName "src-tauri\binaries\parakeet-stream-worker-x86_64-pc-windows-msvc.exe" -Force
        Remove-Item $src -Recurse -Force
        Remove-Item $build -Recurse -Force

    - name: Download parakeet.cpp sidecar (Linux)
      if: runner.os == 'Linux' && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        TAG="v0.3.2"
        ARCH="$(uname -m)"
        mkdir -p src-tauri/binaries

        if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
          ASSET="parakeet-v0.3.2-bin-linux-cpu-arm64.tar.gz"
          EXPECTED="a6f4fd94d373cc7d7f863074e0707e696c3c364dd9cc448deeb4bea350e41c17"
          TRIPLE="aarch64-unknown-linux-gnu"
        else
          ASSET="parakeet-v0.3.2-bin-linux-cpu-x64.tar.gz"
          EXPECTED="d84385fa934dc05cd18e94b85069b7b7664569baea0a05fb6e3c09b06613d23d"
          TRIPLE="x86_64-unknown-linux-gnu"
        fi

        URL="https://github.com/mudler/parakeet.cpp/releases/download/${TAG}/${ASSET}"
        TMP="/tmp/${ASSET}"
        EXT="/tmp/parakeet-ext"
        curl -fsSL "$URL" -o "$TMP"
        ACTUAL="$(sha256sum "$TMP" | awk '{print $1}')"
        [ "$ACTUAL" = "$EXPECTED" ] || { echo "Checksum mismatch for $ASSET"; exit 1; }
        rm -rf "$EXT" && mkdir -p "$EXT"
        tar -xzf "$TMP" -C "$EXT"
        CLI="$(find "$EXT" -type f -name parakeet-cli | head -n 1)"
        [ -n "$CLI" ] || { echo "parakeet-cli not found"; exit 1; }
        cp "$CLI" "src-tauri/binaries/parakeet-cli-${TRIPLE}"
        chmod +x "src-tauri/binaries/parakeet-cli-${TRIPLE}"
        rm -rf "$TMP" "$EXT"

    - name: Build Parakeet streaming worker (Linux)
      if: runner.os == 'Linux' && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        TAG="v0.3.2"
        ARCH="$(uname -m)"
        SRC="/tmp/parakeet-src"
        BUILD="/tmp/parakeet-build"
        TRIPLE="x86_64-unknown-linux-gnu"
        if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
          TRIPLE="aarch64-unknown-linux-gnu"
        fi

        rm -rf "$SRC" "$BUILD"
        git clone --depth 1 --recurse-submodules --shallow-submodules --branch "$TAG" https://github.com/mudler/parakeet.cpp.git "$SRC"
        cp -R src-tauri/sidecars/parakeet-stream-worker "$SRC/examples/localvoice-stream-worker"
        printf '\nadd_subdirectory(examples/localvoice-stream-worker)\n' >> "$SRC/CMakeLists.txt"
        cmake -S "$SRC" -B "$BUILD" -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_BMI2=OFF -DPARAKEET_BUILD_CLI=OFF -DPARAKEET_BUILD_SERVER=OFF
        cmake --build "$BUILD" --config Release --target parakeet-stream-worker --parallel
        WORKER="$(find "$BUILD" -type f -name parakeet-stream-worker | head -n 1)"
        [ -n "$WORKER" ] || { echo "parakeet-stream-worker not found"; exit 1; }
        cp "$WORKER" "src-tauri/binaries/parakeet-stream-worker-${TRIPLE}"
        chmod +x "src-tauri/binaries/parakeet-stream-worker-${TRIPLE}"
        rm -rf "$SRC" "$BUILD"

    - name: Download parakeet.cpp sidecar (macOS)
      if: runner.os == 'macOS' && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        TAG="v0.3.2"
        ARCH="$(uname -m)"
        mkdir -p src-tauri/binaries

        if [ "$ARCH" = "arm64" ]; then
          ASSET="parakeet-v0.3.2-bin-macos-metal-arm64.tar.gz"
          EXPECTED="665cc533f504e3ee1b887a42492176ce0aecdd38f692f5bbaefcab669471c035"
          TRIPLE="aarch64-apple-darwin"
        else
          ASSET="parakeet-v0.3.2-bin-macos-cpu-x64.tar.gz"
          EXPECTED="04ff73ed21b29bb9e05c5475c42128a523c399e084de312219b9fce1f6f4e179"
          TRIPLE="x86_64-apple-darwin"
        fi

        URL="https://github.com/mudler/parakeet.cpp/releases/download/${TAG}/${ASSET}"
        TMP="/tmp/${ASSET}"
        EXT="/tmp/parakeet-ext"
        curl -fsSL "$URL" -o "$TMP"
        ACTUAL="$(shasum -a 256 "$TMP" | awk '{print $1}')"
        [ "$ACTUAL" = "$EXPECTED" ] || { echo "Checksum mismatch for $ASSET"; exit 1; }
        rm -rf "$EXT" && mkdir -p "$EXT"
        tar -xzf "$TMP" -C "$EXT"
        CLI="$(find "$EXT" -type f -name parakeet-cli | head -n 1)"
        [ -n "$CLI" ] || { echo "parakeet-cli not found"; exit 1; }
        cp "$CLI" "src-tauri/binaries/parakeet-cli-${TRIPLE}"
        chmod +x "src-tauri/binaries/parakeet-cli-${TRIPLE}"

        if [ "$TRIPLE" = "aarch64-apple-darwin" ]; then
          cp "src-tauri/binaries/parakeet-cli-${TRIPLE}" \
             "src-tauri/binaries/parakeet-cli-x86_64-apple-darwin"
          chmod +x "src-tauri/binaries/parakeet-cli-x86_64-apple-darwin"
        fi
        rm -rf "$TMP" "$EXT"

    - name: Build Parakeet streaming worker (macOS)
      if: runner.os == 'macOS' && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        TAG="v0.3.2"
        ARCH="$(uname -m)"
        SRC="/tmp/parakeet-src"
        BUILD="/tmp/parakeet-build"
        TRIPLE="x86_64-apple-darwin"
        if [ "$ARCH" = "arm64" ]; then
          TRIPLE="aarch64-apple-darwin"
        fi

        rm -rf "$SRC" "$BUILD"
        git clone --depth 1 --recurse-submodules --shallow-submodules --branch "$TAG" https://github.com/mudler/parakeet.cpp.git "$SRC"
        cp -R src-tauri/sidecars/parakeet-stream-worker "$SRC/examples/localvoice-stream-worker"
        printf '\nadd_subdirectory(examples/localvoice-stream-worker)\n' >> "$SRC/CMakeLists.txt"
        cmake -S "$SRC" -B "$BUILD" -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_BMI2=OFF -DPARAKEET_BUILD_CLI=OFF -DPARAKEET_BUILD_SERVER=OFF
        cmake --build "$BUILD" --config Release --target parakeet-stream-worker --parallel
        WORKER="$(find "$BUILD" -type f -name parakeet-stream-worker | head -n 1)"
        [ -n "$WORKER" ] || { echo "parakeet-stream-worker not found"; exit 1; }
        cp "$WORKER" "src-tauri/binaries/parakeet-stream-worker-${TRIPLE}"
        chmod +x "src-tauri/binaries/parakeet-stream-worker-${TRIPLE}"
        if [ "$TRIPLE" = "aarch64-apple-darwin" ]; then
          cp "src-tauri/binaries/parakeet-stream-worker-${TRIPLE}" \
             "src-tauri/binaries/parakeet-stream-worker-x86_64-apple-darwin"
          chmod +x "src-tauri/binaries/parakeet-stream-worker-x86_64-apple-darwin"
        fi
        rm -rf "$SRC" "$BUILD"

    - name: Smoke test parakeet.cpp sidecar
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ runner.os }}" = "Windows" ]; then
          BIN="src-tauri/binaries/parakeet-cli-x86_64-pc-windows-msvc.exe"
          WORKER="src-tauri/binaries/parakeet-stream-worker-x86_64-pc-windows-msvc.exe"
        else
          BIN="$(ls src-tauri/binaries/parakeet-cli-* | head -n 1)"
          WORKER="$(ls src-tauri/binaries/parakeet-stream-worker-* | head -n 1)"
        fi
        test -f "$BIN"
        test -f "$WORKER"
        OUT="$("$BIN" 2>&1 || true)"
        echo "$OUT" | grep -q "parakeet-cli transcribe"
        WORKER_OUT="$("$WORKER" --health 2>&1)"
        echo "$WORKER_OUT" | grep -q "parakeet.cpp streaming worker"
