# ─────────────────────────────────────────────────────────────────────────────
# Job 3 – Build macOS (Apple Silicon + Intel universal)
# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Resolve tag
        id: resolve-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── whisper.cpp binaries ──────────────────────────────────────────────
      - name: Setup whisper.cpp sidecar
        uses: ./.github/actions/setup-whisper

      - name: Setup parakeet.cpp sidecar
        uses: ./.github/actions/setup-parakeet-cpp

      - name: Audit bundled sidecars (macOS)
        run: |
          test -f src-tauri/resources/nemo_worker/localvoice_nemo_worker.py
          test -f src-tauri/resources/nemo_worker/manifest.json
          test -d src-tauri/parakeet-runtime
          ls src-tauri/binaries/whisper-cli-* >/dev/null
          ls src-tauri/binaries/parakeet-cli-* >/dev/null
          ls src-tauri/binaries/parakeet-stream-worker-* >/dev/null

      - name: Build Tauri app (macOS arm64)
        run: pnpm tauri build --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect macOS artifacts
        run: |
          mkdir -p dist/macos
          find src-tauri/target/aarch64-apple-darwin/release/bundle \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) \
            -exec cp {} dist/macos/ \;

          if [ -z "$(ls -A dist/macos)" ]; then
            echo "No macOS artifacts found!" && exit 1
          fi
          ls -lh dist/macos/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/macos/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 4 – Build Linux (x86_64)
# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: resolve-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            cmake \
            build-essential

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── whisper.cpp binaries ──────────────────────────────────────────────
      - name: Setup whisper.cpp sidecar
        uses: ./.github/actions/setup-whisper

      - name: Setup parakeet.cpp sidecar
        uses: ./.github/actions/setup-parakeet-cpp

      - name: Audit bundled sidecars (Linux)
        run: |
          test -f src-tauri/resources/nemo_worker/localvoice_nemo_worker.py
          test -f src-tauri/resources/nemo_worker/manifest.json
          test -d src-tauri/parakeet-runtime
          ls src-tauri/binaries/whisper-cli-* >/dev/null
          ls src-tauri/binaries/parakeet-cli-* >/dev/null
          ls src-tauri/binaries/parakeet-stream-worker-* >/dev/null

      - name: Build Tauri app (Linux)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect Linux artifacts
        run: |
          mkdir -p dist/linux
          find src-tauri/target/release/bundle \
            \( -name "*.deb" -o -name "*.AppImage" -o -name "*.AppImage.sig" -o -name "*.rpm" \) \
            -exec cp {} dist/linux/ \;

          if [ -z "$(ls -A dist/linux)" ]; then
            echo "No Linux artifacts found!" && exit 1
          fi
          ls -lh dist/linux/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/linux/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 5 – Publish GitHub Release (all platforms)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download unsigned Windows installers
        uses: actions/download-artifact@v4
        with:
          name: unsigned-installers
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: dist/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: dist/linux

      - name: Generate updater manifest
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.build-windows.outputs.tag }}"
          version="${tag#v}"
          release_url="https://github.com/${{ github.repository }}/releases/download/${tag}"

          windows_asset="$(find dist/windows -maxdepth 1 -type f -name '*-setup.exe' | head -n 1)"
          linux_asset="$(find dist/linux -maxdepth 1 -type f -name '*.AppImage' ! -name '*.sig' | head -n 1)"
          macos_asset="$(find dist/macos -maxdepth 1 -type f -name '*.app.tar.gz' ! -name '*.sig' | head -n 1)"

          test -n "$windows_asset"
          test -n "$linux_asset"
          test -n "$macos_asset"
          test -f "${windows_asset}.sig"
          test -f "${linux_asset}.sig"
          test -f "${macos_asset}.sig"

          jq -n \
            --arg version "$version" \
            --arg notes "https://github.com/${{ github.repository }}/releases/tag/${tag}" \
            --arg pub_date "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --arg windows_url "${release_url}/$(basename "$windows_asset")" \
            --arg windows_sig "$(cat "${windows_asset}.sig")" \
            --arg linux_url "${release_url}/$(basename "$linux_asset")" \
            --arg linux_sig "$(cat "${linux_asset}.sig")" \
            --arg macos_url "${release_url}/$(basename "$macos_asset")" \
            --arg macos_sig "$(cat "${macos_asset}.sig")" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $windows_sig, url: $windows_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url },
                "darwin-aarch64": { signature: $macos_sig, url: $macos_url }
              }
            }' > dist/latest.json

          jq empty dist/latest.json

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.build-windows.outputs.tag }}
          name:       "LocalVoice ${{ needs.build-windows.outputs.tag }}"
          draft:      true
          prerelease: false
          files: |
            dist/windows/**
            dist/macos/**
            dist/linux/**
            dist/latest.json
          body: |
            ## LocalVoice ${{ needs.build-windows.outputs.tag }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows (MSI) | `LocalVoice_*.msi` |
            | Windows (NSIS) | `LocalVoice_*-setup.exe` |
            | macOS (Apple Silicon) | `LocalVoice_*.dmg` |
            | Linux (Debian/Ubuntu) | `local-voice_*.deb` |
            | Linux (AppImage) | `LocalVoice_*.AppImage` |

            Windows, macOS, and Linux builds are currently unsigned — see the [security note](https://github.com/${{ github.repository }}#installation) in the README.

            > **Note:** Whisper, Parakeet CLI, and the Parakeet streaming worker
            > sidecars are bundled. Transcription models are not bundled -
            > download them from the Models page after installation. `.nemo`
            > models require an optional local NVIDIA NeMo Python runtime that
            > is configured after installation.

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ needs.build-windows.outputs.tag }}) for details.
