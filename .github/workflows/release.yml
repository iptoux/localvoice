name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline overview
#
#   build-windows  →  release
#   build-macos    ──────────────────────────────┘
#   build-linux    ──────────────────────────────┘
#
# 1. build-windows – compiles the Tauri app for Windows and uploads unsigned
#                    .msi / .exe to GitHub Actions artifact storage.
# 2. build-macos   – compiles for macOS (Apple Silicon), produces .dmg/.app.
#                    Whisper.cpp is built from source via cmake.
# 3. build-linux   – compiles for Linux x86_64, produces .deb / .AppImage.
#                    Whisper.cpp is built from source via cmake.
# 4. release       – creates a draft GitHub Release with all unsigned
#                    artifacts attached.
#
# SignPath is intentionally disabled until OSS support is approved.
# Keep this configuration for reactivation later.
#
# Required repository secrets when SignPath is enabled
#   SIGNPATH_API_TOKEN       – CI user token from your SignPath organisation
#   SIGNPATH_ORGANIZATION_ID – GUID shown in SignPath → Organisation → General
#
# Required SignPath configuration when enabled
#   project-slug             : localvoice
#   signing-policy-slug      : release-signing
#   artifact-configuration-slug: windows-installers
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true
        default: "v0.2.0"

permissions:
  contents: write   # create GitHub Release + upload assets
  # id-token: write # required for SignPath trusted-build OIDC attestation

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 – Build Windows (unsigned)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows:
    name: Build Windows (unsigned)
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}
      unsigned-artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Resolve tag
        id: resolve-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── whisper.cpp binaries ──────────────────────────────────────────────
      - name: Setup whisper.cpp sidecar
        uses: ./.github/actions/setup-whisper

      - name: Setup parakeet.cpp sidecar
        uses: ./.github/actions/setup-parakeet-cpp

      - name: Audit bundled sidecars (Windows)
        shell: pwsh
        run: |
          foreach ($path in @(
            "src-tauri\binaries\whisper-cli-x86_64-pc-windows-msvc.exe",
            "src-tauri\binaries\parakeet-cli-x86_64-pc-windows-msvc.exe",
            "src-tauri\binaries\parakeet-stream-worker-x86_64-pc-windows-msvc.exe",
            "src-tauri\parakeet-runtime",
            "src-tauri\parakeet-runtime\ggml-cpu.dll",
            "src-tauri\resources\nemo_worker\localvoice_nemo_worker.py",
            "src-tauri\resources\nemo_worker\manifest.json"
          )) {
            if (-not (Test-Path $path)) {
              Write-Error "Missing release resource: $path"
              exit 1
            }
          }

      - name: Build Tauri app (Windows)
        shell: bash
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect unsigned installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\unsigned | Out-Null

          $msi = Get-ChildItem "src-tauri\target\release\bundle\msi\*.msi" -ErrorAction SilentlyContinue
          foreach ($f in $msi) {
            Copy-Item $f.FullName "dist\unsigned\$($f.Name)"
            Write-Host "Collected MSI: $($f.Name)"
            if (Test-Path "$($f.FullName).sig") {
              Copy-Item "$($f.FullName).sig" "dist\unsigned\$($f.Name).sig"
            }
          }

          $nsis = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe" -ErrorAction SilentlyContinue
          foreach ($f in $nsis) {
            Copy-Item $f.FullName "dist\unsigned\$($f.Name)"
            Write-Host "Collected NSIS: $($f.Name)"
            if (Test-Path "$($f.FullName).sig") {
              Copy-Item "$($f.FullName).sig" "dist\unsigned\$($f.Name).sig"
            }
          }

          if (-not (Get-ChildItem "dist\unsigned")) {
            Write-Error "No installers found — check bundle configuration in tauri.conf.json."
            exit 1
          }

      - name: Upload unsigned Windows installers
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installers
          path: dist/unsigned/
          retention-days: 1

