name: Bug Report
description: Report a bug to help us improve LocalVoice
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug
      placeholder: Describe the bug here...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: LocalVoice Version
      description: Check Settings → About
      placeholder: e.g., 0.1.0

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste relevant logs from Settings → Logs (if applicable)
      placeholder: |
        [ERROR] ...
        [WARN] ...
