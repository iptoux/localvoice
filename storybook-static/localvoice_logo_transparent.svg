<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="houseGrad" x1="250" y1="180" x2="900" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="35%" stop-color="#00E676"/>
      <stop offset="65%" stop-color="#B2FF00"/>
      <stop offset="100%" stop-color="#00A86B"/>
    </linearGradient>

    <linearGradient id="leftArcGrad" x1="250" y1="450" x2="520" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="50%" stop-color="#3A86FF"/>
      <stop offset="100%" stop-color="#C026D3"/>
    </linearGradient>

    <linearGradient id="rightArcGrad" x1="650" y1="650" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5E5B"/>
      <stop offset="100%" stop-color="#FFB703"/>
    </linearGradient>

    <linearGradient id="micBodyGrad" x1="520" y1="300" x2="700" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8FA9CC"/>
      <stop offset="50%" stop-color="#4E6E96"/>
      <stop offset="100%" stop-color="#1C355A"/>
    </linearGradient>

    <linearGradient id="voiceTextGrad" x1="630" y1="840" x2="980" y2="840" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1EA7FF"/>
      <stop offset="100%" stop-color="#0B57D0"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0A2540" flood-opacity="0.25"/>
    </filter>

    <style>
      .title-main {
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-weight: 800;
        letter-spacing: -2px;
      }
      .subtitle {
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-weight: 600;
        letter-spacing: 6px;
      }
    </style>
  </defs>

  

  <!-- icon group -->
  <g filter="url(#shadow)">
    <!-- house outline -->
    <path d="M345 408 L600 225 L855 408" stroke="url(#houseGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M792 408 L792 347 L836 347 L836 440" stroke="url(#houseGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M360 432 L360 655 L840 655 L840 515" stroke="url(#houseGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- left swoosh -->
    <path d="M323 520
             C350 442, 450 392, 535 408
             C470 450, 432 512, 438 585
             C385 603, 344 585, 323 520Z"
          fill="url(#leftArcGrad)" opacity="0.95" filter="url(#softGlow)"/>

    <path d="M340 542
             C388 500, 415 505, 440 540
             L465 510
             L487 570
             L515 488
             L535 560
             L560 540"
          stroke="#0B2545" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- right swoosh -->
    <path d="M672 640
             C760 635, 810 590, 836 490
             C772 520, 720 567, 700 635
             C692 639, 682 640, 672 640Z"
          fill="url(#rightArcGrad)" opacity="0.98" filter="url(#softGlow)"/>

    <!-- wifi -->
    <path d="M740 490 C790 440, 860 440, 910 490" stroke="#0B2545" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M766 518 C803 481, 847 481, 884 518" stroke="#0B2545" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M794 547 C817 525, 833 525, 856 547" stroke="#0B2545" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="826" cy="570" r="10" fill="#0B2545"/>

    <!-- microphone -->
    <g>
      <rect x="488" y="300" width="224" height="290" rx="112" fill="url(#micBodyGrad)" stroke="#0B2545" stroke-width="12"/>
      <rect x="516" y="328" width="168" height="234" rx="84" fill="none" stroke="#E6EEF7" stroke-width="6" opacity="0.9"/>

      <!-- mic grille -->
      <line x1="536" y1="380" x2="664" y2="380" stroke="#0B2545" stroke-width="12" stroke-linecap="round"/>
      <line x1="536" y1="430" x2="664" y2="430" stroke="#0B2545" stroke-width="12" stroke-linecap="round"/>
      <line x1="536" y1="480" x2="664" y2="480" stroke="#0B2545" stroke-width="12" stroke-linecap="round"/>

      <path d="M600 590 L600 678" stroke="#0B2545" stroke-width="14" stroke-linecap="round"/>
      <path d="M558 678 H642" stroke="#0B2545" stroke-width="14" stroke-linecap="round"/>
      <rect x="584" y="675" width="32" height="44" rx="8" fill="#0B2545"/>
    </g>
  </g>

  <!-- title -->
  <g filter="url(#shadow)">
    <text x="220" y="840" class="title-main" font-size="108" fill="#FFFFFF" stroke="#0B2545" stroke-width="10" paint-order="stroke">
      Local
    </text>
    <text x="565" y="840" class="title-main" font-size="108" fill="url(#voiceTextGrad)" stroke="#0B57D0" stroke-width="4">
      Voice
    </text>
  </g>

  <!-- subtitle -->
  <g opacity="0.55">
    <line x1="250" y1="900" x2="360" y2="900" stroke="#8B919A" stroke-width="3"/>
    <text x="390" y="913" class="subtitle" font-size="28" fill="#8B919A">
      OFFLINE &amp; OPEN SOURCE
    </text>
    <line x1="845" y1="900" x2="950" y2="900" stroke="#8B919A" stroke-width="3"/>
  </g>
</svg>
